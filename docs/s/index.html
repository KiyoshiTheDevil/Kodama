<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kodama — Open Song</title>
  <meta name="robots" content="noindex">
  <style>
    @font-face {
      font-family: 'MiSans Latin';
      src: url('MiSansLatin-Regular.ttf') format('truetype');
      font-weight: 400; font-display: swap;
    }
    @font-face {
      font-family: 'MiSans Latin';
      src: url('MiSansLatin-Semibold.ttf') format('truetype');
      font-weight: 600; font-display: swap;
    }
    :root {
      color-scheme: dark;
      --accent: #e040fb;
      --bg-base: #0d0d0d;
      --bg-surface: #141414;
      --bg-elevated: #1c1c1c;
      --t1: #f5f5f5;
      --t2: #b4b4b4;
      --t3: #7a7a7a;
      --font: 'MiSans Latin', -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: var(--font);
      background:
        radial-gradient(120% 110% at 50% -10%, color-mix(in srgb, var(--accent) 22%, transparent) 0%, transparent 55%),
        var(--bg-base);
      color: var(--t1); padding: 24px;
    }
    .card {
      width: 100%; max-width: 360px; text-align: center;
      background: color-mix(in srgb, var(--bg-surface) 72%, transparent);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 18px; padding: 26px 24px;
      -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
      box-shadow: 0 24px 70px rgba(0,0,0,0.5);
    }
    .logo { width: 132px; height: auto; display: block; margin: 0 auto 20px; opacity: .95; }
    .cover {
      width: 168px; height: 168px; object-fit: cover; border-radius: 14px;
      display: block; margin: 0 auto 16px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.5);
      background: var(--bg-elevated);
    }
    .title {
      font-size: 17px; font-weight: 600; line-height: 1.3; margin: 0 0 3px;
      overflow: hidden; text-overflow: ellipsis; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .artist {
      font-size: 13px; color: var(--t2); margin: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .divider { height: 1px; background: rgba(255,255,255,0.07); margin: 20px 0 16px; }
    p.sub { font-size: 13px; color: var(--t2); margin: 0 0 18px; }
    a.btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      text-decoration: none; font-size: 14px; font-weight: 600; font-family: var(--font);
      padding: 12px 16px; border-radius: 12px; margin-bottom: 9px;
      transition: transform .12s ease, background .12s ease, filter .12s ease;
    }
    a.btn:active { transform: scale(.985); }
    .primary { background: var(--accent); color: #fff; box-shadow: 0 6px 22px color-mix(in srgb, var(--accent) 35%, transparent); }
    .primary:hover { filter: brightness(1.08); }
    .secondary { background: rgba(255,255,255,0.06); color: var(--t1); }
    .secondary:hover { background: rgba(255,255,255,0.11); }
    .ghost { background: transparent; color: var(--t3); font-size: 12px; font-weight: 400; padding: 9px; margin-top: 5px; }
    .ghost:hover { color: var(--t2); }
    .err { color: #ff7070; font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="Kodama-Logo-Full.svg" alt="Kodama">

    <img class="cover" id="cover" alt="" style="display:none">
    <h1 class="title" id="title" style="display:none"></h1>
    <p class="artist" id="artist" style="display:none"></p>
    <div class="divider" id="divider" style="display:none"></div>

    <p class="sub" id="sub">Loading…</p>
    <div id="actions" style="display:none">
      <a class="btn primary" id="kodama">Open in Kodama</a>
      <a class="btn secondary" id="ytm">Open in YouTube Music</a>
      <a class="btn ghost" href="https://github.com/KiyoshiTheDevil/Kodama/releases" target="_blank" rel="noopener">Don't have Kodama? Get it here</a>
    </div>
    <p class="err" id="err" style="display:none">No song specified in this link.</p>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var v = params.get("v") || location.hash.replace(/^#/, "");
      var sub = document.getElementById("sub");
      if (!v || !/^[A-Za-z0-9_-]{6,}$/.test(v)) {
        sub.style.display = "none";
        document.getElementById("err").style.display = "block";
        return;
      }

      // Optional metadata encoded in the link (title / artist / cover).
      var title = params.get("t");
      var artist = params.get("a");
      var cover = params.get("c");
      var hasMeta = false;
      if (cover && /^https?:\/\//i.test(cover)) {
        var img = document.getElementById("cover");
        img.src = cover;
        img.onload = function () { img.style.display = "block"; };
        img.onerror = function () { img.style.display = "none"; };
        hasMeta = true;
      }
      if (title) {
        var te = document.getElementById("title");
        te.textContent = title; te.style.display = "block"; hasMeta = true;
        document.title = artist ? (title + " — " + artist) : title;
      }
      if (artist) {
        var ae = document.getElementById("artist");
        ae.textContent = artist; ae.style.display = "block"; hasMeta = true;
      }
      if (hasMeta) document.getElementById("divider").style.display = "block";

      var kodamaUrl = "kodama://song/" + v;
      var ytmUrl = "https://music.youtube.com/watch?v=" + v;
      document.getElementById("kodama").href = kodamaUrl;
      document.getElementById("ytm").href = ytmUrl;
      document.getElementById("actions").style.display = "block";
      sub.textContent = "Choose where to open this song:";

      // Best-effort auto-open in Kodama (silent — fails harmlessly if not installed).
      try {
        var f = document.createElement("iframe");
        f.style.display = "none";
        f.src = kodamaUrl;
        document.body.appendChild(f);
      } catch (e) {}
    })();
  </script>
</body>
</html>
